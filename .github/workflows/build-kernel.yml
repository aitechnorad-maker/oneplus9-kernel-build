name: Build OnePlus 9 Pro Custom Kernel (SM8350)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Kernel Compilation
    runs-on: ubuntu-22.04

    steps:
      - name: Maximize Build Environment Storage
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout Your Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment (Aggressive Cache Cleanup)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get clean
          sudo apt-get update -qq -y
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential bc bison flex libssl-dev libelf-dev curl git zip unzip cpio gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Download Clang Toolchain (r383902b1)
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchains/clang
          cd $GITHUB_WORKSPACE/toolchains/clang
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android11-qpr2-release/clang-r383902b1.tar.gz
          tar -xf clang-r383902b1.tar.gz
          rm clang-r383902b1.tar.gz

      - name: Clone OnePlus Kernel Source
        run: |
          mkdir -p $GITHUB_WORKSPACE/android_repo/kernel/msm-5.4
          git clone --depth=1 -b oneplus/sm8350_u_14.0.0_oneplus9 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8350.git $GITHUB_WORKSPACE/android_repo/kernel/msm-5.4
          
          # Force the exact scmversion to match the stock kernel and prevent + dirty suffix
          echo "-gd2a1055adeb0" > $GITHUB_WORKSPACE/android_repo/kernel/msm-5.4/.scmversion

      - name: Clone and Integrate Vendor Modules & Devicetree
        run: |
          git clone --depth=1 -b oneplus/sm8350_u_14.0.0_oneplus9 https://github.com/OnePlusOSS/android_kernel_modules_and_devicetree_oneplus_sm8350.git vendor_modules
          
          mkdir -p $GITHUB_WORKSPACE/android_repo/vendor $GITHUB_WORKSPACE/android_repo/device
          
          # Position the vendor and device directories in the native AOSP tree locations
          cp -a vendor_modules/vendor/* $GITHUB_WORKSPACE/android_repo/vendor/ 2>/dev/null || true
          cp -a vendor_modules/device/* $GITHUB_WORKSPACE/android_repo/device/ 2>/dev/null || true
          
          # Techpack belongs in the kernel source root
          mkdir -p $GITHUB_WORKSPACE/android_repo/kernel/msm-5.4/techpack
          cp -a vendor_modules/kernel/msm-5.4/techpack/* $GITHUB_WORKSPACE/android_repo/kernel/msm-5.4/techpack/ 2>/dev/null || true

      - name: Inject Custom Defconfig
        run: |
          if [ -f "$GITHUB_WORKSPACE/lahaina-qgki_defconfig" ]; then
            cp $GITHUB_WORKSPACE/lahaina-qgki_defconfig $GITHUB_WORKSPACE/android_repo/kernel/msm-5.4/arch/arm64/configs/vendor/lahaina-qgki_defconfig
          else
            echo "Falling back: downloading lahaina-qgki_defconfig from main..."
            wget https://raw.githubusercontent.com/aitechnorad-maker/oneplus9-kernel-build/main/lahaina-qgki_defconfig -O $GITHUB_WORKSPACE/android_repo/kernel/msm-5.4/arch/arm64/configs/vendor/lahaina-qgki_defconfig
          fi

      - name: Build the Kernel
        working-directory: ${{ github.workspace }}/android_repo/kernel/msm-5.4
        run: |
          export PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH
          
          # Fix stupid 8-spaces instead of TAB in OnePlus vendor Makefiles
          find arch/arm64/boot/dts/vendor/ -name "Makefile" -exec sed -i 's/^        /\t/g' {} +
          
          mkdir -p out
          
          # Disable LOCALVERSION_AUTO to prevent unexpected tag additions to the kernel release string
          sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' arch/arm64/configs/vendor/lahaina-qgki_defconfig
          
          MAKE_ARGS="O=out ARCH=arm64 SUBARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabihf- LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip LLVM=1"
          
          make $MAKE_ARGS -j$(nproc) vendor/lahaina-qgki_defconfig
          
          # Force disable signature verification and module versions directly in the generated .config
          scripts/config --file out/.config --disable MODULE_SIG_FORCE
          scripts/config --file out/.config --disable MODULE_SIG_ALL
          scripts/config --file out/.config --disable MODVERSIONS
          
          # Confirm .config is populated exactly as expected
          grep -E "CONFIG_LOCALVERSION=|CONFIG_MODULE_SIG|CONFIG_MODVERSIONS" out/.config
          
          make $MAKE_ARGS -j$(nproc)
          
      - name: Integrate AnyKernel3
        run: |
          echo "Cloning AnyKernel3..."
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git $GITHUB_WORKSPACE/AnyKernel3
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          # Remove unnecessary scripts, leaving only what is required to flash the Image
          rm -rf modules patch ramdisk dtbs dtb dtbo.img README.md
          
          echo "Copying compiled Image to AnyKernel3 directory..."
          cp $GITHUB_WORKSPACE/android_repo/kernel/msm-5.4/out/arch/arm64/boot/Image ./Image
          
          echo "Creating AnyKernel3 Flashable ZIP (Image only)..."
          zip -r9 $GITHUB_WORKSPACE/OP9Pro-Custom-Kernel-AK3.zip * -x ".*" -x "*.zip"
          
      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-Kernel-SM8350
          path: |
            OP9Pro-Custom-Kernel-AK3.zip
