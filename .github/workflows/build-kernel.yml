name: Build OnePlus 9 Pro Custom Kernel (SM8350)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Kernel Compilation
    runs-on: ubuntu-22.04

    steps:
      - name: Maximize Build Environment Storage
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout Your Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev curl git zip unzip cpio gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Download Clang Toolchain (r383902b)
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchains/clang
          cd $GITHUB_WORKSPACE/toolchains/clang
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r383902b.tar.gz
          tar -xf clang-r383902b.tar.gz
          rm clang-r383902b.tar.gz

      - name: Clone OnePlus Kernel Source
        run: |
          git clone --depth=1 -b oneplus/sm8350_u_14.0.0_oneplus9 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8350.git kernel_workspace

      - name: Clone and Integrate Vendor Modules & Devicetree
        run: |
          git clone --depth=1 -b oneplus/sm8350_u_14.0.0_oneplus9 https://github.com/OnePlusOSS/android_kernel_modules_and_devicetree_oneplus_sm8350.git vendor_modules
          # Physically copying techpack and other components into the root of the kernel tree
          cp -r vendor_modules/* kernel_workspace/

      - name: Inject Custom Defconfig
        run: |
          cp $GITHUB_WORKSPACE/lahaina-qgki_defconfig $GITHUB_WORKSPACE/kernel_workspace/arch/arm64/configs/vendor/lahaina-qgki_defconfig

      - name: Build the Kernel
        working-directory: ${{ github.workspace }}/kernel_workspace
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH
          
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabihf-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          mkdir -p out
          
          make O=out LLVM=1 -j$(nproc) vendor/lahaina-qgki_defconfig
          make O=out LLVM=1 -j$(nproc)
          
      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-Kernel-SM8350
          path: |
            kernel_workspace/out/arch/arm64/boot/Image
            kernel_workspace/out/arch/arm64/boot/Image.gz
            kernel_workspace/out/arch/arm64/boot/dtb
            kernel_workspace/out/arch/arm64/boot/dts/vendor/qcom/*.dtb
