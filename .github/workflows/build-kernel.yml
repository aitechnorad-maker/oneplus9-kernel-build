name: Build OnePlus 9 Pro Kernel (SM8350)

on:
  workflow_dispatch: # Allows you to trigger the build manually from GitHub

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Your Repository
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev curl git zip unzip
        
    - name: Download Clang 11.0.2 Toolchain
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchains/clang
        cd $GITHUB_WORKSPACE/toolchains/clang
        # Fetching the exact Clang version mentioned in your defconfig
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r383902b.tar.gz
        tar -xf clang-r383902b.tar.gz
        rm clang-r383902b.tar.gz

    - name: Clone OnePlus Kernel Source
      run: |
        git clone --depth=1 -b oneplus/sm8350_u_14.0.0_oneplus9 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8350.git kernel_workspace

    - name: Clone Modules and Devicetree
      run: |
        # Cloning into the vendor directory as expected by Qualcomm build scripts
        git clone --depth=1 -b oneplus/sm8350_u_14.0.0_oneplus9 https://github.com/OnePlusOSS/android_kernel_modules_and_devicetree_oneplus_sm8350.git kernel_workspace/vendor/qcom/opensource

    - name: Build the Kernel
      working-directory: ${{ github.workspace }}/kernel_workspace
      run: |
        # Setup Environment Variables
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH
        
        # Cross compile flags pointing to our downloaded Clang
        export CC=clang
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip

        # Make the output directory
        mkdir -p out

        # Generate the .config file using the defconfig you provided
        make O=out vendor/lahaina-qgki_defconfig

        # Compile the kernel
        make O=out -j$(nproc --all) \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
    - name: Upload Kernel Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Kernel-SM8350
        path: |
          kernel_workspace/out/arch/arm64/boot/Image
          kernel_workspace/out/arch/arm64/boot/dtb
